<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RET02 Retirement Income Planning Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">RET02 workbook rebuild</p>
        <h1>Retirement Income Planning Calculator</h1>
        <p class="subhead">Matches the formulas in ret02.xls including Social Security and full projection tables.</p>
      </div>
    </header>

    <section class="workspace">
      <aside class="panel sidebar">
        <form id="calc-form" class="inputs-form">
          <h2>Inputs</h2>
          <div class="input-list">
            <label><span>Current age</span><input id="currentAge" type="number"></label>
            <label><span>Current gross annual income</span><input id="currentIncome" type="text" inputmode="numeric"></label>
            <label><span>Spouse annual income</span><input id="spouseIncome" type="text" inputmode="numeric"></label>
            <label><span>Current retirement savings</span><input id="currentSavings" type="text" inputmode="numeric"></label>
            <label><span>Inflation / salary increase</span><input id="inflation" type="text" inputmode="decimal" class="percent-input"></label>
            <label><span>Desired retirement age</span><input id="retireAge" type="number"></label>
            <label><span>Years of retirement income</span><input id="retireYears" type="number"></label>
            <label><span>Income desired at retirement</span><input id="desiredPct" type="text" inputmode="decimal" class="percent-input"></label>
            <label><span>Pre-retirement return</span><input id="preReturn" type="text" inputmode="decimal" class="percent-input"></label>
            <label><span>Post-retirement return</span><input id="postReturn" type="text" inputmode="decimal" class="percent-input"></label>
            <label><span>Include Social Security</span><select id="includeSS"><option>Y</option><option>N</option></select></label>
            <label><span>Single or married</span><select id="marital"><option>M</option><option>S</option></select></label>
          </div>
          <div class="actions">
            <button type="submit">Recalculate</button>
            <button type="button" id="resetBtn" class="secondary">Reset</button>
          </div>
        </form>
      </aside>

      <section class="main-column">
        <section class="panel summary">
          <h2>Results</h2>
          <div id="primaryMessage" class="message"></div>
          <div id="waitMessage" class="message subtle"></div>
          <div class="metrics" id="metrics"></div>
        </section>

        <section class="panel analysis-panel">
          <h2>Retirement Analysis</h2>
          <div class="chart-container">
            <canvas id="projectionChart"></canvas>
          </div>
        </section>

        <section class="panel table-panel">
          <div class="panel-header">
            <h2>Projection</h2>
            <button type="button" id="exportPdfBtn" class="secondary">Export PDF</button>
          </div>
          <div class="table-wrap">
            <table id="projectionTable"><thead></thead><tbody></tbody></table>
          </div>
        </section>
      </section>
    </section>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="formulas.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
